{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto my-16 px-4">
    <div class="bg-white p-8 rounded border border-gray-200 shadow-xl border-t-8 border-siepe-blue">
        <h2 class="text-2xl font-bold text-siepe-blue mb-2 text-center">Acesso ao Sistema</h2>
        <p class="text-gray-500 text-xs text-center mb-6">Utilize seu CPF cadastrado para acessar</p>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded text-sm font-semibold {% if message.tags == 'error' %} bg-red-100 text-red-700 {% else %} bg-blue-100 text-blue-700 {% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">CPF do Aluno/Responsável:</label>
                <input type="text" name="cpf" required maxlength="14" class="w-full p-3 border border-gray-300 rounded focus:border-siepe-blue focus:ring-1 focus:ring-siepe-blue outline-none transition" placeholder="Apenas números">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Senha de Acesso:</label>
                <input type="password" name="password" required class="w-full p-3 border border-gray-300 rounded focus:border-siepe-blue focus:ring-1 focus:ring-siepe-blue outline-none transition" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-gradient-to-b from-blue-950 via-blue-900 to-blue-900 text-white p-3 rounded font-bold hover:bg-blue-700 transition shadow">
                AUTENTICAR NO PORTAL
            </button>
        </form>
    </div>
</div>
{% endblock %}
